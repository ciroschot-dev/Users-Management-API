services:
  users_management:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:jdbc:postgresql://db:5432/usersProyect?CreateDatabaseIfNotExist=true&ServerTimezone=UTC
      - DB_USERNAME=postgres
      - DB_PASSWORD=121343ab
    restart: always
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=121343ab
      - POSTGRES_DB=db_users
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d db_users -h localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5