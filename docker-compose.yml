services:
  users_management:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/db_users
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=121343ab
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=121343ab
      - POSTGRES_DB=db_users
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d db_users" ]
      interval: 10s
      timeout: 5s
      retries: 5